<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Amazon.in Clone | Unique Home</title>
    <style>
        /* Unique Simple Enhancements */
        body { background-color: #e3e6e6; } /* Amazon's specific light gray */

        .hero-banner {
            width: 100%;
            height: 450px;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 60%, #e3e6e6 100%), 
                        url('image_57c38f.jpg');
            background-size: cover;
            background-position: center top;
        }

        .floating-container {
            max-width: 1500px;
            margin: -250px auto 0 auto; /* Pulls cards UP over the image */
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .amazon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .category-card {
            background: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .category-card:hover {
            transform: translateY(-5px); /* Simple hover effect */
        }

        .category-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            margin: 10px 0;
        }

        .link-text {
            color: #007185;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            margin-top: auto;
        }

        .link-text:hover { color: #C7511F; text-decoration: underline; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">amazon.in</a>
    <nav>
        <a href="index.html">Home</a>
        <a href="services.html">Video Games</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<!-- Hero Section using your image -->
<div class="hero-banner"></div>

<!-- The Floating Content Area -->
<div class="floating-container">
    <div class="amazon-grid">
        
        <!-- Card 1 -->
        <div class="category-card">
            <h3>Up to 70% off | Electronics</h3>
            <img src="Electronics.jpg" alt="Electronics">
            <a href="services.html" class="link-text">See all offers</a>
        </div>

        <!-- Card 2 -->
        <div class="category-card">
            <h3>Revamp your home</h3>
            <img src="Home Decor.jpg" alt="Home Decor">
            <a href="#" class="link-text">Explore more</a>
        </div>

        <!-- Card 3 -->
        <div class="category-card">
            <h3>Gaming Bestsellers</h3>
            <img src="Gaming.jpg" alt="Gaming">
            <a href="services.html" class="link-text">Shop now</a>
        </div>

    </div>
</div>

<footer>
    <p>© 1996-2026, Amazon Clone Project | India</p>
</footer>

</body>
</html>
