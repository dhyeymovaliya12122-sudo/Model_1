<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auto | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div id="header"></div>

    <main>
        <form action="profile.html" method="GET">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">Welcome Back</h2>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">Sign In</button>
            
            <p style="text-align: center; margin-top: 1.5rem;">
                Don't have an account? <a href="register.html" style="color: var(--primary-color);">Create one here</a>.
            </p>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Premium Auto Dealership. All rights reserved.</p>
    </footer>
</body>
<script src="main.js"></script>
</html>
