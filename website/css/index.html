<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auto | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header"></div>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h2>Find Your Dream Car Today</h2>
                <p>
                    Explore our vast collection of luxury, sports,
                    and family vehicles.
                </p>

                <a href="showroom.html" class="btn">
                    Browse Showroom
                </a>
            </div>
        </section>

        <section class="featured">
            <h2>Featured Vehicles</h2>

            <div class="car-grid">

                <div class="car-card">
                    <img src="2025 Harley-Davidson Sportster S.jpg" alt="2025 Harley-Davidson Sportster S" class="car-image">

                    <h3>2025 Harley-Davidson Sportster S</h3>
                    <p class="price">$55,000</p>

                    <a href="2025 Harley-Davidson Sportster S.jpg" class="btn">
                        View Details
                    </a>
                </div>

                <div class="car-card">

                    <img src="2024 Volvo S60.jpg" alt="2024 Volvo S60" class="car-image">
                    <h3>2024 Volvo S60</h3>
                    <p class="price">$28,500</p>

                    <a href="2024 Volvo S60.jpg" class="btn">
                        View Details
                    </a>
                </div>

            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Premium Auto Dealership. All rights reserved.</p>
    </footer>

    <script src="./main.js"></script>

</body>
</html>
