<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration Form</title>
</head>
<body>

    <h2>Register Your Account</h2>

    <form action="/submit-form" method="POST" enctype="multipart/form-data">
        
        <fieldset>
            <legend>Personal Details</legend>
            
            <p>
                <label for="fname">Full Name:</label><br>
                <input type="text" id="fname" name="fullname" required>
            </p>

            <p>
                <label for="email">Email Address:</label><br>
                <input type="email" id="email" name="email" required>
            </p>

            <p>
                <label for="pwd">Password:</label><br>
                <input type="password" id="pwd" name="password" required>
            </p>

            <p>
                <label>Gender:</label><br>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
            </p>

            <p>
                <label for="profile_pic">Upload Profile Picture:</label><br>
                <input type="file" id="profile_pic" name="profile_pic" accept="image/*">
            </p>

            <hr>

            <p>
               <!-- Security Captcha -->
                <code style="background: #ddd; padding: 5px; border: 1px solid #000;">X 8 R 2 Q</code><br><br>
                <input type="text" name="captcha_input" placeholder="Type the code above" required>
            </p>

            <p>
                <input type="submit" value="Get Started">
                <input type="reset" value="Clear Form">
            </p>

        </fieldset>
    </form>

</body>
</html>
